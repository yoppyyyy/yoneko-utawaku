<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utawaku Archive — 歌枠アーカイブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <!-- ==================== HEADER (C-1) ==================== -->
  <header>
    <div class="site-title">Utawaku Archive</div>
    <div class="site-subtitle">— Setlist Database —</div>
    <div class="site-meta">非公式ファンサイト</div>
  </header>

  <!-- ==================== STATS BAR (C-2) ==================== -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-number" id="statStreams">0</div>
      <div class="stat-label">Streams</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="statSongs">0</div>
      <div class="stat-label">Songs</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="statUnique">0</div>
      <div class="stat-label">Unique</div>
    </div>
  </div>

  <div class="gothic-divider">✦</div>

  <!-- ==================== SEARCH (C-3) ==================== -->
  <div class="search-section">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput"
             placeholder="曲名・アーティスト名で検索...">
    </div>
    <div class="search-results-count" id="searchCount"></div>
  </div>

  <!-- ==================== NAV TABS (C-4) ==================== -->
  <nav class="nav-tabs">
    <button class="nav-tab active" data-tab="streams">🎤 歌枠一覧</button>
    <button class="nav-tab" data-tab="songs">♪ 楽曲一覧</button>
  </nav>

  <!-- ==================== STREAMS TAB (C-5, C-6) ==================== -->
  <div class="tab-content active" id="tab-streams">
    <div class="streams-grid" id="streamsGrid">
      <!-- JS が動的に生成 -->
    </div>
  </div>

  <!-- ==================== SONGS TAB (C-7) ==================== -->
  <div class="tab-content" id="tab-songs">
    <div class="songs-header">
      <h2>All Songs</h2>
      <div class="sort-controls">
        <button class="sort-btn active" data-sort="name">曲名順</button>
        <button class="sort-btn" data-sort="count">歌唱回数</button>
        <button class="sort-btn" data-sort="date">最新順</button>
      </div>
    </div>
    <table class="songs-table" id="songsTable">
      <thead>
        <tr>
          <th>曲名</th>
          <th>アーティスト</th>
          <th>歌唱回数</th>
          <th>最新</th>
        </tr>
      </thead>
      <tbody id="songsBody">
        <!-- JS が動的に生成 -->
      </tbody>
    </table>
  </div>

  <!-- ==================== FOOTER (C-8) ==================== -->
  <footer>
    <div class="footer-text">Utawaku Archive — Unofficial Fan Project</div>
    <div class="footer-note">This is an unofficial fan site. All stream content belongs to its respective creator.</div>
  </footer>

</div>

<script src="js/app.js"></script>
</body>
</html>
